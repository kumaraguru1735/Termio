name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # for creating the GitHub Release on tag push

jobs:
  build:
    name: ${{ matrix.os }} build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build (TypeScript + Vite bundles)
        run: npm run build

      - name: Package (electron-builder)
        env:
          # No code-signing for now — set the env vars below to enable later:
          # CSC_LINK, CSC_KEY_PASSWORD for macOS; WIN_CSC_LINK for Windows.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npx electron-builder --linux deb AppImage --x64
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Build both Intel and Apple-Silicon variants — the runner is arm64
            # so x64 uses Electron's prebuilt cross-arch binary.
            npx electron-builder --mac dmg zip --x64 --arm64
          else
            npx electron-builder --win nsis portable --x64
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termio-${{ matrix.os }}
          path: |
            release/*.deb
            release/*.AppImage
            release/*.dmg
            release/*.zip
            release/*.exe
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
